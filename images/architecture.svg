<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 560">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Lane 1: Request Path background -->
  <rect x="20" y="20" width="640" height="190" rx="14" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5" opacity="0.8"/>
  <text font-family="Arial, sans-serif" font-size="12" fill="#185FA5" x="36" y="44">Request path</text>

  <!-- Lane 2: Autonomous Path background -->
  <rect x="20" y="230" width="640" height="310" rx="14" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5" opacity="0.8"/>
  <text font-family="Arial, sans-serif" font-size="12" fill="#534AB7" x="36" y="254">Autonomous path</text>

  <!-- Browser -->
  <rect x="44" y="68" width="110" height="104" rx="8" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#0C447C" x="99" y="114" text-anchor="middle" dominant-baseline="central">Browser</text>
  <text font-family="Arial, sans-serif" font-size="12" fill="#185FA5" x="99" y="136" text-anchor="middle" dominant-baseline="central">React / Vite</text>

  <!-- Arrow: Browser -> FastAPI -->
  <line x1="154" y1="120" x2="224" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A" x="189" y="113" text-anchor="middle">JWT</text>

  <!-- FastAPI -->
  <rect x="224" y="68" width="130" height="104" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#085041" x="289" y="114" text-anchor="middle" dominant-baseline="central">FastAPI</text>
  <text font-family="Arial, sans-serif" font-size="12" fill="#0F6E56" x="289" y="136" text-anchor="middle" dominant-baseline="central">Railway</text>

  <!-- Arrow: FastAPI -> Supabase -->
  <line x1="354" y1="120" x2="424" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A" x="389" y="113" text-anchor="middle">RLS</text>

  <!-- Supabase (shared, spans both lanes) -->
  <rect x="424" y="68" width="130" height="450" rx="8" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#085041" x="489" y="286" text-anchor="middle" dominant-baseline="central">Supabase</text>
  <text font-family="Arial, sans-serif" font-size="12" fill="#0F6E56" x="489" y="308" text-anchor="middle" dominant-baseline="central">Postgres + Auth</text>

  <!-- APScheduler -->
  <rect x="44" y="278" width="110" height="104" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#26215C" x="99" y="322" text-anchor="middle" dominant-baseline="central">APScheduler</text>
  <text font-family="Arial, sans-serif" font-size="11" fill="#3C3489" x="99" y="344" text-anchor="middle" dominant-baseline="central">5 AM PT</text>

  <!-- Arrow: Scheduler -> Claude -->
  <line x1="154" y1="330" x2="224" y2="330" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Claude Agent -->
  <rect x="224" y="278" width="130" height="104" rx="8" fill="#CECBF6" stroke="#7F77DD" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#26215C" x="289" y="318" text-anchor="middle" dominant-baseline="central">Claude Agent</text>
  <text font-family="Arial, sans-serif" font-size="11" fill="#3C3489" x="289" y="340" text-anchor="middle" dominant-baseline="central">Haiku · tool use</text>

  <!-- Arrow: Claude -> Supabase -->
  <line x1="354" y1="330" x2="422" y2="330" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A" x="388" y="323" text-anchor="middle">tools</text>

  <!-- Arrow: Scheduler -> Resend -->
  <line x1="99" y1="382" x2="99" y2="430" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A" x="78" y="410" text-anchor="middle">5 PM</text>

  <!-- Resend -->
  <rect x="44" y="430" width="110" height="56" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#412402" x="99" y="458" text-anchor="middle" dominant-baseline="central">Resend</text>

  <!-- Arrow: Resend -> User inbox -->
  <line x1="154" y1="458" x2="224" y2="458" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- User inbox -->
  <rect x="224" y="430" width="130" height="56" rx="8" fill="#D3D1C7" stroke="#888780" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" x="289" y="458" text-anchor="middle" dominant-baseline="central">User inbox</text>

  <!-- Flight Adapter -->
  <rect x="580" y="278" width="70" height="104" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#4A1B0C" x="615" y="318" text-anchor="middle" dominant-baseline="central">Flight</text>
  <text font-family="Arial, sans-serif" font-size="13" font-weight="500" fill="#4A1B0C" x="615" y="336" text-anchor="middle" dominant-baseline="central">adapter</text>
  <text font-family="Arial, sans-serif" font-size="11" fill="#712B13" x="615" y="356" text-anchor="middle" dominant-baseline="central">fast-flights</text>

  <!-- Arrow: Claude -> Flight Adapter -->
  <path d="M354 292 L410 292 L410 248 L615 248 L615 278" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Arrow: Flight Adapter -> Claude (return) -->
  <path d="M615 382 L615 500 L410 500 L410 368 L354 368" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

</svg>
